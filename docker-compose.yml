# Tujuan: Menyediakan stack infrastruktur lokal fase 0 untuk PostgreSQL, Redis, dan MinIO.
# Caller: Developer lokal melalui `docker compose up -d`.
# Dependensi: Image resmi postgres, redis, dan minio; file `.env`.
# Main Functions: Menyalakan service pendukung agar backend/frontend bisa dikembangkan secara lokal.
# Side Effects: Membuat container, volume data lokal, dan membuka port infrastruktur.

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms_bimbel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_bimbel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms_user -d lms_bimbel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lms_bimbel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "20", "1"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: lms_bimbel_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
