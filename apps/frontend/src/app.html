<!--
Tujuan: Template HTML dasar frontend SvelteKit fase 0 dengan font proyek dan shell root.
Caller: SvelteKit server/runtime browser.
Dependensi: app.css, aset static, Google Fonts Plus Jakarta Sans.
Main Functions: Menyediakan root document untuk seluruh route frontend.
Side Effects: Memuat font eksternal dan menjadi wadah hydration aplikasi.
-->

<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fffaf5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
  </html>
